
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: recipebot
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/recipebot
      JWT_SECRET_KEY: change-me-to-a-random-secret
      JWT_ALGORITHM: HS256
      JWT_EXPIRE_MINUTES: "1440"
      # Required for storing/reading project credentials (OpenAI, Discord, etc.). Same key used by seed.
      ENCRYPTION_KEY: L57_9ksKmrCJ7Prht4FFOVWL7PaVqGAFhWkaRmj6qQY=
      CORS_ORIGINS: http://localhost:3000
    volumes:
      - .:/workspace:ro
    depends_on:
      - db
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
